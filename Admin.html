<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR. | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .radar-logo { font-weight: 900; letter-spacing: -0.05em; font-style: italic; }
        .dot { color: #ff007f; }
        .glass { background: #0a0e17; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-upload { background: #7c3aed; }
        
        /* Custom scrollbar for library */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #7c3aed;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-12">
        <div class="radar-logo text-3xl">RADAR<span class="dot">.</span> <span class="text-sm font-normal not-italic text-gray-500 ml-2">ADMIN</span></div>
        <a href="/" class="text-xs font-bold text-gray-400 hover:text-white transition">VIEW LIVE SITE</a>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Upload Section -->
        <div class="glass p-8 rounded-[2rem]">
            <h2 class="text-xl font-bold mb-6 flex items-center">
                <i class="fa-solid fa-cloud-arrow-up mr-3 text-purple-500"></i> Upload Tracks
            </h2>
            <div id="dropzone" class="border-2 border-dashed border-white/10 rounded-2xl p-12 text-center hover:border-purple-500/50 transition cursor-pointer group">
                <input type="file" id="fileInput" multiple class="hidden" accept="audio/*">
                <i class="fa-solid fa-file-audio text-4xl text-gray-600 group-hover:text-purple-500 mb-4 transition"></i>
                <p class="text-gray-400">Click or drag audio files here</p>
                <p class="text-xs text-gray-600 mt-2">MP3, WAV, or OGG preferred</p>
            </div>
            <div id="selectedFiles" class="mt-4 text-xs text-purple-400 font-medium h-4"></div>
            <button onclick="uploadFiles()" id="uploadBtn" class="w-full mt-4 py-4 btn-upload rounded-xl font-bold hover:opacity-90 transition active:scale-[0.98]">
                START UPLOAD
            </button>
        </div>

        <!-- Library Section -->
        <div class="glass p-8 rounded-[2rem]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Library</h2>
                <button onclick="loadTracks()" class="text-xs text-gray-500 hover:text-purple-400 transition">
                    <i class="fa-solid fa-rotate"></i> Refresh
                </button>
            </div>
            <div id="trackList" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                <div class="text-center py-20 text-gray-600">
                    <i class="fa-solid fa-spinner animate-spin mb-2"></i>
                    <p>Fetching signal...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const selectedFilesLabel = document.getElementById('selectedFiles');
        
        // Point to the live Render server
        const API_BASE = 'https://radar-dance-radio.onrender.com';

        fileInput.onchange = () => {
            const count = fileInput.files.length;
            selectedFilesLabel.innerText = count > 0 ? `${count} file(s) ready for upload` : '';
        };

        dropzone.onclick = () => fileInput.click();

        async function uploadFiles() {
            const files = fileInput.files;
            if (files.length === 0) return alert("Select files first");
            
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.innerText = "UPLOADING...";

            const formData = new FormData();
            for (let file of files) formData.append('songs', file);

            try {
                const res = await fetch(`${API_BASE}/api/upload`, { 
                    method: 'POST', 
                    body: formData,
                    mode: 'cors'
                });
                
                if (!res.ok) throw new Error('Upload failed');
                
                const data = await res.json();
                if (data.success) {
                    fileInput.value = '';
                    selectedFilesLabel.innerText = '';
                    loadTracks();
                }
            } catch (err) {
                console.error(err);
                alert("Upload failed. Make sure the server is awake. Try visiting the URL directly first.");
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerText = "START UPLOAD";
            }
        }

        async function loadTracks() {
            const container = document.getElementById('trackList');
            
            try {
                // Fetch with explicit CORS mode
                const res = await fetch(`${API_BASE}/api/tracks`, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (!res.ok) throw new Error('Could not load library');
                
                const tracks = await res.json();
                
                if (tracks.length === 0) {
                    container.innerHTML = '<div class="text-center py-20 text-gray-600 italic">No tracks in library</div>';
                    return;
                }

                container.innerHTML = tracks.map(t => `
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-transparent hover:border-purple-500/30 transition group">
                        <div class="flex items-center space-x-3 truncate">
                            <div class="w-8 h-8 bg-purple-500/10 rounded flex items-center justify-center">
                                <i class="fa-solid fa-music text-purple-500 text-xs"></i>
                            </div>
                            <span class="text-sm truncate text-gray-300 group-hover:text-white">${t.name}</span>
                        </div>
                        <span class="text-[10px] text-gray-600 font-mono uppercase">Stored</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Connection Error:", err);
                container.innerHTML = `<div class="text-center py-20 text-red-500/50 italic font-medium px-4">
                    <p>Failed to connect to RADAR. server</p>
                    <p class="text-[10px] mt-4 opacity-50">Server may be sleeping. <br> Visit <a href="${API_BASE}" target="_blank" class="underline">${API_BASE}</a> to wake it up.</p>
                </div>`;
            }
        }

        // Drag and drop handlers
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.add('border-purple-500', 'bg-purple-500/5');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.remove('border-purple-500', 'bg-purple-500/5');
            }, false);
        });

        dropzone.addEventListener('drop', (e) => {
            fileInput.files = e.dataTransfer.files;
            fileInput.onchange();
        });

        window.onload = loadTracks;
    </script>
</body>
</html>
